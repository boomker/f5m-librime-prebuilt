name: macOS Build (RIME only, arm64)

on:
  workflow_dispatch:
  push:
    branches: [ "*" ]
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 4 * * *'

jobs:
  check-latest-commit:
    runs-on: ubuntu-latest
    outputs:
      skip_build: ${{ steps.check.outputs.skip_build }}
      latest_pb_commit: ${{ steps.check.outputs.latest_pb_commit }}
    steps:
      - name: Check if build is needed
        id: check
        shell: bash
        run: |
          # 1️⃣ 获取 f5m-rime-arm64-extra latest release body
          cur_release_body=$(curl -s https://api.github.com/repos/boomker/f5m-rime-arm64-extra/releases/latest | jq -r '.body')
          cur_release_commit=$(echo "$cur_release_body" | grep -Eo 'commit [0-9a-f]{7,40}' | awk '{print $2}')

          if [ -z "$cur_release_commit" ]; then
            echo "No commit found in latest release body, continue build."
          fi

          # 2️⃣ 获取 fcitx5-plugins 最新 commit id
          pb_json=$(curl -s https://api.github.com/repos/boomker/f5m-librime-prebuilder/releases/latest)
          pb_body=$(echo "$pb_json" | jq -r '.body')
          latest_pb_commit=$(echo "$pb_body" | grep -Eo 'commit [0-9a-f]{7,40}' | awk '{print $2}')
          
          [ -z "$latest_pb_commit" ] && latest_pb_commit="ba7094093e67557820c0d3750199ac52e1ee2c37"

          echo "latest_pb_commit=$latest_pb_commit" >> "$GITHUB_OUTPUT"

          echo "current release commit: $cur_release_commit"
          echo "Latest pbuilder commit: $latest_pb_commit"

          # 3️⃣ 比对
          if [ "$cur_release_commit" = "$latest_pb_commit" ]; then
            echo "Commit matches latest release, skipping build."
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

  clean-release-assets:
    needs: check-latest-commit
    if: needs.check-latest-commit.outputs.skip_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Delete all .so assets in 'latest' release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.repository }}"
          api="https://api.github.com/repos/$repo"
          release_id=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$api/releases/tags/latest" | jq -r .id)

          if [ "$release_id" = "null" ]; then
            echo "Release 'latest' not found. Skipping."
            exit 0
          fi

          curl -s -H "Authorization: token $GITHUB_TOKEN" "$api/releases/$release_id/assets" \
          | jq -r '.[] | select(.name | endswith(".so")) | .id' \
          | xargs -r -I{} curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" "$api/releases/assets/{}"

  build:
    needs: [check-latest-commit, clean-release-assets]
    if: needs.check-latest-commit.outputs.skip_build != 'true'
    runs-on: macos-latest

    steps:
      # 1️⃣ 拉取 fcitx5-plugins 仓库，递归子模块
      - name: Checkout fcitx5-plugins
        uses: actions/checkout@v5
        with:
          repository: fcitx-contrib/fcitx5-plugins
          path: fcitx5-plugins
          submodules: recursive

      # 2️⃣ 获取当前最新commit id
      - name: Get fcitx5-plugins commit id
        id: get-commit
        run: |
          latest_pb_commit="${{ needs.check-latest-commit.outputs.latest_pb_commit }}"
          echo "Using prebuilder commit: $latest_pb_commit"
          echo "commit_id=$latest_pb_commit" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      # 3️⃣ 安装依赖1
      - name: Install dependencies
        working-directory: fcitx5-plugins
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
        run: |
          brew update # always use latest go as github actions image may be inconsistent between runs.
          brew install \
            extra-cmake-modules \
            ninja \
            go
          ./scripts/install-deps.sh macos arm64
          rm -f cache/macos/librime-arm64.tar.bz2
          rm -f cache/macos/lua-arm64.tar.bz2
          wget -P cache/macos https://github.com/boomker/f5m-librime-prebuilder/releases/download/latest/librime-arm64.tar.bz2
          wget -P cache/macos https://github.com/boomker/f5m-librime-prebuilder/releases/download/latest/lua-arm64.tar.bz2
          tar xf cache/macos/librime-arm64.tar.bz2 -C build/macos-arm64/usr
          tar xf cache/macos/lua-arm64.tar.bz2 -C build/macos-arm64/usr
          sudo tar xf cache/macos/marisa-arm64.tar.bz2 -C /usr/local bin/marisa-build # Make use of Rosetta
          pip install dirhash

      # 4️⃣ 安装依赖2（fcitx5 dev包）
      - name: Install Fcitx5 dev package
        run: |
          wget https://github.com/fcitx-contrib/fcitx5-macos/releases/download/latest/Fcitx5-arm64-dev.tar.bz2
          sudo tar xf Fcitx5-arm64-dev.tar.bz2 -C "/Library/Input Methods"

      # 5️⃣ 自动生成 CMakePresets.json（只启用 RIME）
      - name: Generate CMakePresets.json (RIME only)
        working-directory: fcitx5-plugins
        shell: bash
        run: |
          set -e

          echo "Extracting CMake options..."

          # 提取顶层 option 名称（假定均为大写）
          options=$(grep -R "^[[:space:]]*option(" CMakeLists.txt \
            | sed -E 's/.*option\(([A-Z0-9_]+).*/\1/' \
            | sort -u)

          echo "Detected options:"
          echo "$options"

          mkdir -p build-support

          cat > CMakePresets.json << 'EOF'
          {
            "version": 6,
            "configurePresets": [
              {
                "name": "ci-rime-only",
                "generator": "Ninja",
                "binaryDir": "build/macos-arm64",
                "cacheVariables": {
          EOF

          first=1
          for opt in $options; do
            if [ "$opt" = "RIME" ]; then
              val="ON"
            else
              val="OFF"
            fi

            if [ $first -eq 1 ]; then
              first=0
            else
              echo "," >> CMakePresets.json
            fi

            echo "          \"$opt\": \"$val\"" >> CMakePresets.json
          done

          cat >> CMakePresets.json << 'EOF'
                }
              }
            ]
          }
          EOF

          echo "===== Generated CMakePresets.json ====="
          cat CMakePresets.json


      # 6️⃣ 修改 rimestate.cpp
      - name: Patch rimestate.cpp（https://github.com/fcitx/fcitx5-rime/pull/113）
        working-directory: fcitx5-plugins
        if: false
        run: |
          sed -i '' '/if (context.menu.num_candidates) {/c\
          \ \ \ \ \ \ \ \ if (!api->get_option(session, "_hide_candidate") && context.menu.num_candidates) {\
          ' fcitx5-rime/src/rimestate.cpp
          echo "cat fcitx5-rime/src/rimestate.cpp start"
          echo ""
          cat fcitx5-rime/src/rimestate.cpp
          echo ""
          echo "cat fcitx5-rime/src/rimestate.cpp end"

      # 7️⃣ 编译
      - name: Configure & Build
        working-directory: fcitx5-plugins
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: -mmacosx-version-min=13.3
          GOFLAGS: -ldflags=-buildid=
          GOARCH: arm64
        run: |
          ls -l patches
          #git apply --directory=libime patches/libime.patch
          #git apply --directory=fcitx5-jyutping patches/jyutping.patch
          git apply --directory=fcitx5-rime patches/rime.log.patch
          #git apply --directory=fcitx5-table-other patches/table-other.patch
          #git apply --directory=fcitx5-zhuyin patches/zhuyin.patch
          #cmake -B build/macos-arm64 -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --preset ci-rime-only \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64

          cmake --build build/macos-arm64
          #./scripts/install.sh macos arm64
          ls -l ./
          ls -l ./build/
          ls -l ./build/macos-arm64/
          find . -name "librime.so" | xargs ls -l
          find . -name 'librime.so' -exec strip -x {} \;

      # 8️⃣ 上传 artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: fcitx5-plugins-rime-macos-arm64-so
          path: |
            fcitx5-plugins/build/macos-arm64/bin/librime.so

      # 9️⃣ 上传到 GitHub Release (tag: latest)
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "macOS RIME Build"
          body: |
            This artifact was automatically built by GitHub Actions
            from [fcitx-contrib/fcitx5-plugins](https://github.com/fcitx-contrib/fcitx5-plugins).
            with the commit ${{ steps.get-commit.outputs.commit_id }} of [boomker/librime](https://github.com/boomker/librime).
          files: |
            fcitx5-plugins/build/macos-arm64/bin/librime.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
